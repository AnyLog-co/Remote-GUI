services:
  remote-gui:
    image: anylogco/remote-gui:video-stream
    container_name: remote-gui
    restart: always
    stdin_open: true
    tty: true
    environment:
      # VITE_API_URL: http://127.0.0.1:8000
      VITE_API_URL: http://192.168.1.206:8000
      # CORS: origin the browser loads the frontend from (scheme + host + FE port)
      # FRONTEND_URL: http://192.168.1.206:3000
      # Default AnyLog node connection (ip:port) — bookmarked and set as default on boot
      # REST_CONN: 23.239.12.151:32349
      # Optional request timeout tuning (seconds)
      # ANYLOG_CONNECT_TIMEOUT: 5
      # ANYLOG_READ_TIMEOUT: 30
      #GRAFANA_URL: http://23.239.12.151:3100/dashboards
    ports:
      - "3000:3000"
      - "3001:3001"
      - "8000:8000"
    volumes:
      - image-vol:/app/CLI/local-cli-backend/static/
      - usr-mgm-vol:/app/CLI/local-cli/backend/usr-mgm/
      - report-configs:/app/CLI/local-cli-backend/plugins/reportgenerator/templates
#  ollama-node:
#    container_name: ollama
#    image: ollama/ollama:latest
#    ports:
#      - "11435:11434"
#    volumes:
#      - ollama-data:/root/.ollama

volumes:
  image-vol:
  usr-mgm-vol:
  report-configs:
#  ollama-data:


