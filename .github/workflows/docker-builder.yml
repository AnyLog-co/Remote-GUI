name: Version Update & Docker Build

on:
  push:
    branches:
      - main
      - pre-develop
      - os-dev

jobs:
  update-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Get setup.cfg
        run: |
          # os-dev holds the canonical version on the upstream repo.
          # On forks without os-dev, fall back to the already-checked-out setup.cfg.
          if git fetch origin os-dev 2>/dev/null; then
            git checkout FETCH_HEAD -- setup.cfg
          else
            echo "origin/os-dev not found; using setup.cfg from the current branch"
          fi

      - name: Run version update script
        run: python .github/scripts/generate_git_id.py

      - name: Update CHANGELOG (os-dev only)
        if: github.ref_name == 'os-dev'
        run: python .github/scripts/version_control.py --changelog CHANGELOG.md --branch os-dev

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add setup.cfg
          git add CHANGELOG.md 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update version [os-dev] [skip ci]"
          git pull --rebase origin ${GITHUB_REF_NAME}
          git push

  docker-build:
    runs-on: ubuntu-latest
    needs: update-version
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Pull latest
        run: git pull origin ${GITHUB_REF_NAME}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        run: |
          TAG=""
          if [[ "${GITHUB_REF_NAME}" == "pre-develop" ]]; then
            TAG=$(grep -m1 '^version =' setup.cfg  | cut -d= -f2-| tr -d '"\r'  | awk -F " " '{print $1}')
          elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            TAG=latest
          fi
          if [[ "${TAG}" ]] ; then
            echo "Using Docker tag: ${TAG}"
            bash image_builder.sh \
              --tag ${TAG} \
              --platform linux/amd64,linux/arm64 \
              --push
          else
            bash image_builder.sh \
            --platform linux/amd64,linux/arm64 \
            --push
          fi